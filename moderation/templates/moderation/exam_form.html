{% extends 'public/base.html' %}
{% block title %}Add Exam{% endblock %}
{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:8rem 1.5rem 4rem">
  <div class="card glass form-card form-card-wide anim-up">
    <h2 style="margin-bottom:.5rem">Add Exam</h2>
    <p style="margin-bottom:2rem">Module: <strong>{{ module.title }}</strong></p>
    <form method="POST">
      {% csrf_token %}
      <div class="form-group"><label>Exam Title</label><input type="text" name="title" class="form-control" required placeholder="e.g. Theory Exam - OSI Model"></div>
      <div class="form-row">
        <div class="form-group">
          <label>Exam Type</label>
          <select name="exam_type" class="form-control">
            <option value="THEORY">Theory (in-browser)</option>
            <option value="PRACTICAL">Practical (desktop app)</option>
            <option value="MIXED">Mixed</option>
          </select>
        </div>
        <div class="form-group">
          <label>Difficulty</label>
          <select name="difficulty" class="form-control">
            <option value="BEGINNER">Beginner</option>
            <option value="INTERMEDIATE" selected>Intermediate</option>
            <option value="ADVANCED">Advanced</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Max Score</label><input type="number" name="max_score" class="form-control" step="0.01" value="10.00" required></div>
        <div class="form-group"><label>Passing Score</label><input type="number" name="passing_score" class="form-control" step="0.01" value="5.00" required></div>
      </div>
      <div class="form-group"><label>Requirement / Question Text</label><textarea name="requirement_text" class="form-control" rows="6" required placeholder="Describe what students must do or answer..."></textarea></div>
      <div class="form-group">
        <label>Starting Topology JSON (for Practical/Mixed only)</label>
        <textarea name="starting_topology" class="form-control" rows="4" style="font-family:monospace;font-size:.85rem" placeholder='{"devices": [], "links": []}'></textarea>
        <p class="form-text">Leave empty for theory exams.</p>
      </div>
      <div class="form-actions">
        <a href="{% url 'moderation:module_edit' module.id %}" class="btn btn-outline">Cancel</a>
        <button type="submit" class="btn btn-primary">Create Exam</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
