{% extends 'public/base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:8rem 1.5rem 4rem">
  <div class="card glass form-card anim-up">
    <div style="text-align:center;margin-bottom:2rem">
      <div style="width:56px;height:56px;border-radius:14px;background:rgba(99,102,241,.15);display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:var(--accent);margin:0 auto 1rem">
        <i class="fa-solid fa-network-wired"></i>
      </div>
      <h2 style="font-size:1.6rem">Welcome back</h2>
      <p style="margin:0;font-size:.9rem">Sign in to your LMS account</p>
    </div>
    <form method="POST" action="{% url 'accounts:login' %}">
      {% csrf_token %}
      <div class="form-group">
        <label>Email address</label>
        <input type="email" name="email" class="form-control" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:.5rem">Sign In <i class="fa-solid fa-arrow-right"></i></button>
    </form>
    <p style="text-align:center;margin-top:1.5rem;font-size:.88rem">
      New student? <a href="{% url 'accounts:register' %}">Create an account</a>
    </p>
  </div>
</div>
{% endblock %}
