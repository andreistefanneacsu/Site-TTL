{% extends 'public/base.html' %}
{% block title %}Add Laboratory{% endblock %}
{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:8rem 1.5rem 4rem">
  <div class="card glass form-card form-card-wide anim-up">
    <h2 style="margin-bottom:.5rem">Add Laboratory</h2>
    <p style="margin-bottom:2rem">Module: <strong>{{ module.title }}</strong></p>
    <form method="POST">
      {% csrf_token %}
      <div class="form-group"><label>Lab Title</label><input type="text" name="title" class="form-control" required placeholder="e.g. Lab 1 - Basic IP Config"></div>
      <div class="form-group"><label>Instructions</label><textarea name="instructions" class="form-control" rows="6" placeholder="Step-by-step instructions for students..."></textarea></div>
      <div class="form-group">
        <label>Starting Topology (JSON)</label>
        <textarea name="starting_topology" class="form-control" rows="8" style="font-family:monospace;font-size:.85rem" placeholder='{"devices": [], "links": []}'>{"devices": [], "links": []}</textarea>
        <p class="form-text">Must be valid JSON representing the initial network topology.</p>
      </div>
      <div class="form-actions">
        <a href="{% url 'moderation:module_edit' module.id %}" class="btn btn-outline">Cancel</a>
        <button type="submit" class="btn btn-primary">Add Lab</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
