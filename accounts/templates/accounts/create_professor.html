{% extends 'public/base.html' %}
{% block title %}Add Professor{% endblock %}
{% block content %}
<style>
  select option { background-color: #1E1E2E; color: #CDD6F4; }
</style>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:8rem 1.5rem 4rem">
  <div class="card glass form-card form-card-wide anim-up">
    <h2 style="margin-bottom:1.75rem"><i class="fa-solid fa-user-tie" style="color:var(--accent)"></i> Create Professor Account</h2>
    <form method="POST">
      {% csrf_token %}
      <div class="form-row">
        <div class="form-group"><label>First Name</label><input type="text" name="first_name" class="form-control" required></div>
        <div class="form-group"><label>Last Name</label><input type="text" name="last_name" class="form-control" required></div>
      </div>
      <div class="form-group"><label>Email</label><input type="email" name="email" class="form-control" required></div>
      <div class="form-group"><label>Temporary Password</label><input type="password" name="password" class="form-control" required></div>
      <hr class="form-divider">
      <div class="form-row">
        <div class="form-group"><label>University</label><input type="text" name="university" class="form-control" required></div>
        <div class="form-group"><label>Faculty</label><input type="text" name="faculty" class="form-control" required></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Academic Title</label>
          <select name="academic_title" class="form-control" required>
            <option value="ASISTENT">Asistent</option>
            <option value="LECTOR">Lector</option>
            <option value="CONFERENTIAR">Conferentiar</option>
            <option value="PROFESOR">Profesor</option>
          </select>
        </div>
        <div class="form-group"><label>Department</label><input type="text" name="department" class="form-control" required></div>
      </div>
      <div class="form-actions">
        <a href="{% url 'accounts:manage_users' %}" class="btn btn-outline">Cancel</a>
        <button type="submit" class="btn btn-primary">Create Professor</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
